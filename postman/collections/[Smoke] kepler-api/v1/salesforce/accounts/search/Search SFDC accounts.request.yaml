type: http
name: Search SFDC accounts
url: '{{baseUrl}}/v1/salesforce/accounts/search?q=string&limit=10'
method: GET
headers:
  - key: Accept
    value: application/json
queryParams:
  - key: q
    value: string
    description: Search query (account name, partial match supported)
  - key: limit
    value: '10'
    description: Maximum results to return
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "data": [
              {
                "id": "string",
                "name": "string",
                "arr": 3043.6898290782733,
                "pipelineArr": 2748.4220938820213,
                "csm": "string",
                "ae": "string",
                "industry": "string",
                "tier": "string"
              },
              {
                "id": "string",
                "name": "string",
                "arr": 1427.9743296301283,
                "pipelineArr": 5920.196110118596,
                "csm": "string",
                "ae": "string",
                "industry": "string",
                "tier": "string"
              }
            ],
            "total": 6608
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Search results
