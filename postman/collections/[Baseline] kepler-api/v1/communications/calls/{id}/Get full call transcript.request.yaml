            "timestamp": "1986-05-14T06:10:40.462Z",
            "participants": [
              {
                "name": "string",
                "email": "B7p5fS@gviMJ.ai",
                "role": "string"
              },
              {
                "name": "string",
                "email": "dxz@CRaVRzsXoceosMRklHZrs.hrg",
                "role": "string"
              }
            ],
            "transcript": [
              {
                "speaker": "string",
                "text": "string",
                "startTime": 2617.4614623164416,
                "endTime": 8436.907619462112
              },
              {
                "speaker": "string",
                "text": "string",
