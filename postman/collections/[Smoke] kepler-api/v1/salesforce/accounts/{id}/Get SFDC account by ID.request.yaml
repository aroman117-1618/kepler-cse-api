type: http
name: Get SFDC account by ID
url: '{{baseUrl}}/v1/salesforce/accounts/:id'
method: GET
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: id
    value: string
    description: Salesforce account ID
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "id": "string",
            "name": "string",
            "arr": 9431.181002841902,
            "pipelineArr": 6882.624337938654,
            "csm": "string",
            "ae": "string",
            "industry": "string",
            "tier": "string"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: SFDC account data
  - response:
      statusCode: 404
      statusText: Not Found
      body:
        type: text
        content: ''
    name: Account not found
