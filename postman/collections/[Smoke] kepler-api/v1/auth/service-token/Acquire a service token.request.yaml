type: http
name: Acquire a service token
url: '{{baseUrl}}/v1/auth/service-token'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "client_id": "kepler-cs-pipeline",
      "client_secret": "secret_xxxxxxxxxxxxx"
    }
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "access_token": "string",
            "token_type": "Bearer",
            "expires_in": 3600,
            "scope": "kepler:accounts:read kepler:salesforce:read kepler:communications:read"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Token issued successfully
  - response:
      statusCode: 401
      statusText: Unauthorized
      body:
        type: json
        content: |-
          {
            "code": "string",
            "message": "string",
            "details": {
              "key_0": "string"
            }
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Invalid credentials
