type: http
name: Get open opportunities for an account
url: '{{baseUrl}}/v1/salesforce/opportunities?account_id=string'
method: GET
headers:
  - key: Accept
    value: application/json
queryParams:
  - key: account_id
    value: string
    description: Salesforce account ID
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "data": [
              {
                "id": "string",
                "name": "string",
                "stage": "string",
                "amount": 2741.5031698557323,
                "closeDate": "1985-09-12",
                "type": "string",
                "probability": 1420.187348675388
              },
              {
                "id": "string",
                "name": "string",
                "stage": "string",
                "amount": 6981.19967836462,
                "closeDate": "1971-03-20",
                "type": "string",
                "probability": 4987.966538999684
              }
            ],
            "accountId": "string"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Opportunities list
